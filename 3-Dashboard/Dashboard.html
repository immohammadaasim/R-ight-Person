<html lang="en">

    <title>R-ight Person | Spatial OS Dashboard</title>

    <!-- [ PWA MANIFEST LINK ] -->
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#000000">

    <!-- [ GLOBAL UI MODULES - CSS ] -->
    <link rel="stylesheet" href="../0-Theme/Theme.css?v=1.5">

<!-- ===================================================================== -->
<!-- ===>> BLOCK HTML 2: Sidebar OS Architecture (The Central Hub) <<=== -->
<!-- ===================================================================== -->
<body class="spatial-dashboard">

    <!-- 1. Side Spatial Power Strip (Left-Aligned Control Hub) -->
    <aside class="sidebar-os spatial-glass" id="sidebar">
        <!-- Top: Primary Identity Avatar -->
        <div class="sidebar-top">
            <div class="profile-pill haptic-touch" id="master-avatar-trigger" title="Digital Identity">
                <div class="profile-avatar" id="user-avatar-initial">U</div>
            </div>
        </div>

        <!-- Middle: Primary & Utility Apps -->
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active haptic-touch" title="Home" id="nav-home">
                <i class="fa-light fa-grid-2"></i>
            </a>
            <!-- Smart Tool: Calculator (Injected Module) -->
            <a href="#" class="nav-item haptic-touch" title="Calculator" id="tool-calc">
                <i class="fa-light fa-calculator"></i>
            </a>
            <!-- Smart Tool: Notes (Injected Module) -->
            <a href="#" class="nav-item haptic-touch" title="Notes" id="tool-notes">
                <i class="fa-light fa-notebook"></i>
            </a>
        </nav>

        <!-- Bottom: System Status & Control -->
        <div class="sidebar-bottom">
            <!-- Notification Capsule Pill -->
            <div class="notif-pill-btn haptic-touch" id="notif-capsule-trigger" title="Notifications">
                <i class="fa-light fa-bell"></i>
                <span class="notif-dot"></span>
            </div>

            <div class="system-controls">
                <!-- Theme Controller -->
                <button class="nav-util-btn haptic-touch" id="global-theme-toggle">
                    <i id="theme-icon" class="fa-light fa-moon"></i>
                </button>

                <!-- iOS Status Indicators (Vertical List) -->
                <div class="sidebar-status-pill">
                    <div class="status-time" id="dash-clock">--:--</div>
                    <div class="status-icons-list">
                        <i class="fa-solid fa-wifi"></i>
                        <div class="ios-battery-pill"></div>
                    </div>
                </div>

                <!-- Global Sign Out -->
                <button class="nav-item logout-trigger haptic-touch" id="logout-btn-trigger" title="Logout">
                    <i class="fa-light fa-power-off"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- 2. Floating Page Title (The "Azad" Header) -->
    <header class="floating-page-header">
        <span class="page-indicator blue-accent" id="current-page-title">Home</span>
    </header>

    <!-- 3. Main Content Container -->
    <main class="content-viewport" id="main-content">
        <div id="contentArea" class="spatial-entry-animation">
            <!-- Content will be injected here via JS -->
        </div>
    </main>

<!-- ===================================================================== -->
<!-- ===>> END OF BLOCK HTML 2 file : 3-Dashboard/Dashboard.html <<=== -->
<!-- ===================================================================== -->


<!-- ===================================================================== -->
<!-- ===>> BLOCK HTML 3: Home Dashboard Content (Spatial Views) <<=== -->
<!-- ===================================================================== -->
<!-- 
    VIEWPORT LOGIC:
    - ContentArea: Yahan hamare Widgets aur Grid rahenge.
    - Normalized Size: Widgets ab compact honge (iPadOS 18 Widget Standard).
-->

<!-- 1. Home Dashboard View -->
<div id="home-dashboard-view" class="dashboard-view active">

    <!-- Top Row: Normalized Spatial Widgets -->
    <div class="home-header-row">

        <!-- Greeting Widget (Compact Glass) -->
        <div class="home-widget-card spatial-glass haptic-touch" id="greeting-widget">
            <div class="greeting-content">
                <h1 class="greeting-text">Good <span id="greeting-time" class="blue-accent">Day</span>,</h1>
                <h2 class="greeting-name" id="user-display-name">Guest</h2>
                <p class="date-text secondary-label" id="current-full-date">LOADING DATE...</p>
            </div>
        </div>

        <!-- Weather Widget (Compact Glass) -->
        <div class="home-widget-card spatial-glass haptic-touch" id="weather-widget">
            <div class="weather-row">
                <div class="weather-info">
                    <h2 id="weather-city" class="primary-text">Location</h2>
                    <p id="weather-temp" class="blue-accent">--°</p>
                    <span id="weather-desc" class="secondary-label">Updating Weather...</span>
                </div>
                <div class="weather-icon-box">
                    <i class="fa-light fa-cloud-sun-bright" id="main-weather-icon"></i>
                </div>
            </div>
        </div>

    </div>

    <!-- 2. App Library Section (The Identity Ecosystem) -->
    <div class="app-library-section">
        <h3 class="section-label">Your Secure Ecosystem</h3>
        <div class="home-app-grid" id="main-app-grid">
            <!-- App Icons (Squircles) will be injected here via JS -->
        </div>
    </div>

</div>

<!-- ===>> BLOCK HTML 4: Universal Overlays & Modular Portals <<=== -->
<!-- ===================================================================== -->
<!-- 
    MODULAR SYNC:
    - Assistive Touch: Master floating menu.
    - Action Sheet: Premium confirmation drawer (Logout).
    - Module Portal: Rasta jahan Lock Screen aur Apps inject hongi.
-->

<!-- 1. Universal Notification Slot (Dynamic Island Sync) -->
<!-- Note: Ye Notch hamare Global Notification.js engine se link hai -->
<div id="showIsland" class="dynamic-island-wrapper">
    <div class="dynamic-island-pill">
        <div id="island-icon" class="island-icon-box"></div>
        <p id="island-message" class="island-msg-text"></p>
    </div>
</div>

<!-- 2. Assistive Touch (Master Floating Controller) -->
<div id="assistive-touch-container" class="at-container">
    <div id="at-trigger" class="at-trigger haptic-touch">
        <div class="at-inner-circle"></div>
    </div>

    <!-- AT Menu Overlay (visionOS Style Grid) -->
    <div id="at-menu-overlay" class="at-menu-overlay">
        <div class="at-menu-grid spatial-glass">
            <div class="at-menu-item haptic-touch" id="at-home-trigger">
                <div class="at-icon-box"><i class="fa-light fa-house"></i></div>
                <span>Home</span>
            </div>
            <div class="at-menu-item haptic-touch" id="at-lock-trigger">
                <div class="at-icon-box"><i class="fa-light fa-lock"></i></div>
                <span>Lock</span>
            </div>
            <div class="at-menu-item haptic-touch" onclick="location.reload()">
                <div class="at-icon-box"><i class="fa-light fa-rotate"></i></div>
                <span>Refresh</span>
            </div>
            <div class="at-menu-item destructive-text haptic-touch" id="at-logout-trigger">
                <div class="at-icon-box"><i class="fa-light fa-power-off"></i></div>
                <span>Logout</span>
            </div>
        </div>
    </div>
</div>

<!-- 3. Spatial Action Sheet (System Confirmation Drawer) -->
<div id="logout-action-sheet" class="action-sheet-overlay">
    <div class="action-sheet-container spatial-glass">
        <div class="action-sheet-header">
            <p class="secondary-label">Confirm Sign Out from <strong class="primary-text">Identity OS</strong>?</p>
        </div>
        <div class="action-sheet-group">
            <button class="action-sheet-btn destructive-text haptic-touch" id="confirm-logout-btn">Sign Out</button>
        </div>
        <div class="action-sheet-group cancel-group">
            <button class="action-sheet-btn blue-accent haptic-touch" id="cancel-logout-btn">Cancel</button>
        </div>
    </div>
</div>

<!-- 4. Universal Module Portal (The Injection Slot) -->
<!-- Yahan hum Calculator, Notes, aur Security Lock ko dynamically load karenge -->
<div id="universal-module-portal"></div>

<!-- 5. Spatial Page Loader (Apple OS Feel) -->
<div id="fullscreen-loader" class="fullscreen-loader spatial-glass">
    <div class="loader-content">
        <div class="apple-spinner-large">
            <div></div><div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div><div></div>
        </div>
        <p id="loader-text" class="secondary-label">Securing Identity...</p>
    </div>
</div>

<!-- ===================================================================== -->
<!-- ===>> BLOCK HTML 5: Global Engine Integration & Logic Entry <<=== -->
<!-- ===================================================================== -->
<!-- 
    SYSTEM ARCHITECTURE NOTE:
    1. Global Modules: Handle Theme, Notifications, and App Installation.
    2. Supabase: Core database and Real-time connectivity.
    3. Dashboard.js: Local OS behavior and widget management.
-->

<!-- 1. Supabase Foundation (v2) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2. Global Universal OS Modules -->
<script src="../0-Theme/Theme.js?v=1.5" defer></script>
<script src="../0.1-Notification/Notification.js?v=1.5" defer></script>
<script src="../0.2-Install/Install.js?v=1.5" defer></script>

<!-- 3. Local Dashboard OS Logic -->
<script src="Dashboard.js?v=1.5" defer></script>

<!-- 4. Core System Activation Script -->
<script>
    /**
     * revealSpatialOS: 
     * Sabhi modules ke taiyar hone ke baad hi dashboard ko reveal karta hai.
     * Rule: Zero-Jerk Arrival.
     */
    window.addEventListener('load', () => {
        // Reveal Body (Opacity 1)
        setTimeout(() => {
            document.body.classList.add('loaded');
            console.log("Spatial OS Dashboard: System Activated.");
        }, 200);

        // Inject PWA Install Capsule (Dynamic Injection)
        if (typeof fetch === 'function') {
            fetch('../0.2-Install/Install.html')
                .then(res => res.text())
                .then(html => {
                    const portal = document.getElementById('universal-module-portal');
                    if (portal) portal.insertAdjacentHTML('beforeend', html);
                })
                .catch(err => console.warn("PWA Injection skip: ", err));
        }
    });
</script>

</body>
</html>
