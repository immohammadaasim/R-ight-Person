    window.addEventListener('load', () => {
        // Smooth Body Reveal (Opacity 0 -> 1)
        setTimeout(() => {
            document.body.classList.add('loaded');
        }, 150);

        // PWA Install Capsule Injection (Dynamic Loader)
        if (typeof fetch === 'function') {
            fetch('../0.2-Install/Install.html')

                    if (portal) portal.insertAdjacentHTML('beforeend', html);
