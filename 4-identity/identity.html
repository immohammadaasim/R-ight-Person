<!-- ===================================================================== -->
<!-- ===>> BLOCK HTML 2: The Identity Stage (7-Day Journey) <<=== -->
<!-- ===================================================================== -->
<body class="spatial-identity-os">

    <main class="identity-stage">
        
        <!-- --------------------------------------------------------------- -->
        <!-- [ START : BLOCK HTML 2A - DAY 1: BASIC IDENTITY ] -->
        <!-- --------------------------------------------------------------- -->
        <div id="identity-day-1" class="identity-card active spatial-glass">
            <header class="card-header">
                <div class="header-left">
                    <span class="step-indicator blue-accent">DAY 01 / 07</span>
                    <h1 class="primary-text">Basic Identity</h1>
                    <p class="secondary-label">Let's start with your official roots.</p>
                </div>
                <div class="progress-box">
                    <div class="circular-progress" style="--p: 15%;"></div>
                </div>
            </header>

            <section class="identity-form-body">
                <div class="input-group">
                    <label class="field-label">FULL NAME (AS PER GOVT ID)</label>
                    <input type="text" id="id-full-name" class="spatial-input" placeholder="e.g. Rahul Sharma" autocomplete="off">
                </div>

                <div class="input-group">
                    <label class="field-label">DATE OF BIRTH</label>
                    <input type="date" id="id-dob" class="spatial-input">
                </div>

                <div class="input-group">
                    <label class="field-label">GENDER</label>
                    <div class="segmented-control" id="gender-selector">
                        <button class="seg-btn active haptic-touch" data-value="Male">Male</button>
                        <button class="seg-btn haptic-touch" data-value="Female">Female</button>
                        <button class="seg-btn haptic-touch" data-value="Other">Other</button>
                    </div>
                </div>

                <div class="input-group">
                    <label class="field-label">MARITAL STATUS</label>
                    <select id="id-marital-status" class="spatial-input select-style">
                        <option value="">Select Status</option>
                        <option value="Single">Single</option>
                        <option value="Married">Married</option>
                        <option value="Divorced">Divorced</option>
                        <option value="Widowed">Widowed</option>
                    </select>
                </div>
            </section>

            <footer class="card-footer">
                <button id="save-day-1" class="master-action-btn haptic-touch">
                    <span>Continue to Day 2</span>
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
                <p class="security-note"><i class="fa-solid fa-shield-check"></i> Verified by R-ight Identity Protocol</p>
            </footer>
        </div>
        <!-- --------------------------------------------------------------- -->
        <!-- [ END : BLOCK HTML 2A - file : 4-identity/identity.html ] -->
        <!-- --------------------------------------------------------------- -->


        <!-- --------------------------------------------------------------- -->
        <!-- [ START : BLOCK HTML 2B - DAY 2: CONTACT & ROOTS ] -->
        <!-- --------------------------------------------------------------- -->
        <div id="identity-day-2" class="identity-card spatial-glass" style="display:none;">
            <header class="card-header">
                <div class="header-left">
                    <span class="step-indicator blue-accent">DAY 02 / 07</span>
                    <h1 class="primary-text">Contact & Roots</h1>
                    <p class="secondary-label">Where do you belong in the world?</p>
                </div>
                <div class="progress-box">
                    <div class="circular-progress" style="--p: 30%;"></div>
                </div>
            </header>

            <section class="identity-form-body">
                <div class="input-group">
                    <label class="field-label">CURRENT ADDRESS</label>
                    <textarea id="id-address" class="spatial-input area-style" placeholder="House No, Street, City..."></textarea>
                </div>
                <div class="input-group">
                    <label class="field-label">PINCODE</label>
                    <input type="number" id="id-pincode" class="spatial-input" placeholder="000000">
                </div>
                <div class="input-group">
                    <label class="field-label">EMERGENCY CONTACT NAME</label>
                    <input type="text" id="id-emergency-name" class="spatial-input" placeholder="Name of Person">
                </div>
                <div class="input-group">
                    <label class="field-label">EMERGENCY CONTACT PHONE</label>
                    <input type="tel" id="id-emergency-phone" class="spatial-input" placeholder="+91 XXXX-XXXXXX">
                </div>
            </section>

            <footer class="card-footer">
                <button id="save-day-2" class="master-action-btn haptic-touch">Continue to Day 3</button>
            </footer>
        </div>
        <!-- --------------------------------------------------------------- -->
        <!-- [ END : BLOCK HTML 2B - file : 4-identity/identity.html ] -->
        <!-- --------------------------------------------------------------- -->

        <!-- Day 3 to Day 7 ke blocks isi stage mein engine ke zariye arrive honge -->

    </main>

<!-- ===================================================================== -->
<!-- ===>> END OF BLOCK HTML 2 file : 4-identity/identity.html <<=== -->
<!-- ===================================================================== -->
