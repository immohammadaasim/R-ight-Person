<!-- ===================================================================== -->
<!-- ===>> BLOCK HTML 2: Identity Stage & Day 1 Form Structure <<=== -->
<!-- ===================================================================== -->
<body class="spatial-identity-os">

    <!-- 1. Spatial Identity Canvas (Main Container) -->
    <main class="identity-stage">
        
        <!-- Day 1 Card: The Roots (Basic Identity) -->
        <div id="identity-day-1" class="identity-card active spatial-glass">
            
            <!-- [ START : BLOCK HTML 2A - Header & Progress ] -->
            <header class="card-header">
                <div class="header-content">
                    <span class="step-indicator blue-accent">DAY 01 / 07</span>
                    <h1 class="primary-text">Basic Identity</h1>
                    <p class="secondary-label">Let's start with your official roots.</p>
                </div>
                <div class="progress-ring-box">
                    <div class="identity-progress-bar" style="--p: 15%;"></div>
                </div>
            </header>
            <!-- [ END : BLOCK HTML 2A - file : 4-identity/identity.html ] -->

            <!-- [ START : BLOCK HTML 2B - Identity Input Fields ] -->
            <section class="identity-form-body">
                
                <!-- Full Name Field -->
                <div class="input-group">
                    <label class="field-label">FULL NAME (AS PER GOVT ID)</label>
                    <input type="text" id="id-full-name" class="spatial-input" placeholder="e.g. Rahul Sharma" autocomplete="off">
                </div>

                <!-- DOB Field -->
                <div class="input-group">
                    <label class="field-label">DATE OF BIRTH</label>
                    <input type="date" id="id-dob" class="spatial-input">
                </div>

                <!-- Gender Selection (iPad Segmented Control style) -->
                <div class="input-group">
                    <label class="field-label">GENDER</label>
                    <div class="segmented-control" id="gender-selector">
                        <button class="seg-btn active haptic-touch" data-value="Male">Male</button>
                        <button class="seg-btn haptic-touch" data-value="Female">Female</button>
                        <button class="seg-btn haptic-touch" data-value="Other">Other</button>
                    </div>
                </div>

                <!-- Marital Status Field -->
                <div class="input-group">
                    <label class="field-label">MARITAL STATUS</label>
                    <select id="id-marital-status" class="spatial-input select-style">
                        <option value="">Select Status</option>
                        <option value="Single">Single</option>
                        <option value="Married">Married</option>
                        <option value="Divorced">Divorced</option>
                        <option value="Widowed">Widowed</option>
                    </select>
                </div>

            </section>
            <!-- [ END : BLOCK HTML 2B - file : 4-identity/identity.html ] -->

            <!-- [ START : BLOCK HTML 2C - Action Footer ] -->
            <footer class="card-footer">
                <button id="save-identity-day-1" class="master-action-btn haptic-touch">
                    <span>Continue to Day 2</span>
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
                <p class="security-note"><i class="fa-solid fa-shield-halved"></i> Data is verified by R-ight Person Identity Protocol.</p>
            </footer>
            <!-- [ END : BLOCK HTML 2C - file : 4-identity/identity.html ] -->

        </div> <!-- End identity-day-1 -->

        <!-- Dynamic Slots for Day 2-7 will be handled by Engine -->
        <div id="identity-future-slots"></div>

    </main>

<!-- ===================================================================== -->
<!-- ===>> END OF BLOCK HTML 2 file : 4-identity/identity.html <<=== -->
<!-- ===================================================================== -->

    <div id="showIsland" class="dynamic-island-wrapper">

            <p id="island-message" class="island-msg-text"></p>
        </div>
    </div>

    <!-- 2. Universal Theme Slot (Hidden Manager) -->
    <div id="theme-manager-portal" style="display:none;">
        <button id="global-theme-toggle"><i id="theme-icon"></i></button>
    </div>

    <!-- 3. Spatial Page Loader -->
    <div id="fullscreen-loader" class="fullscreen-loader spatial-glass">
        <div class="loader-content">
            <div class="apple-spinner-large">
                <div></div><div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div><div></div>
            </div>
            <p id="loader-text" class="secondary-label">Verifying Identity Roots...</p>
        </div>
    </div>
